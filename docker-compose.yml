  #     - "50051:50051"  # gRPC port
  #   environment:
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     DB_URL: postgresql://postgres:password@postgres:5432/blightsanest_dev
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./rag:/app

  # API Service (Go)
  # TODO: Uncomment when API service is ready with Dockerfile
  # api:
  #   build:
  #     context: ./api
  #     dockerfile: Dockerfile
  #   container_name: blightsanest_api
  #   ports:
  #     - "8080:8080"  # HTTP port
  #   environment:
  #     DB_URL: postgresql://postgres:password@postgres:5432/blightsanest_dev
  #     RAG_SERVICE_HOST: rag
  #     RAG_SERVICE_PORT: 50051
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./api:/app

  # PubSub Service (Go)
